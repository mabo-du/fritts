name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # ── Build Python wheel ──────────────────────────────────────────────────
  build-wheel:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build distribution
        run: |
          pip install build
          python -m build

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: python-wheel
          path: dist/

  # ── Publish to PyPI ─────────────────────────────────────────────────────
  publish-pypi:
    needs: build-wheel
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: python-wheel
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          skip-existing: true

  # ── Standalone desktop binaries ─────────────────────────────────────────
  build-desktop:
    needs: build-wheel
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-20.04
            name: fritts-linux-x64
          - os: macos-latest
            name: fritts-macos-arm64
          - os: windows-latest
            name: fritts-windows-x64
            ext: .exe

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install system deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1 libgl1 libopengl0 libxkbcommon-x11-0

      - name: Install project + PyInstaller
        run: |
          pip install pyinstaller
          pip install -e .

      - name: Build standalone executable
        shell: bash
        run: |
          pyinstaller --onefile --name fritts src/dendro/main.py \
            --hidden-import PyQt6 \
            --hidden-import pyqtgraph \
            --hidden-import scipy.special._ufuncs_cxx \
            --collect-all dendro

      - name: Build AppImage (Linux)
        if: runner.os == 'Linux'
        run: |
          wget -qO appimagetool-x86_64.AppImage "https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage"
          chmod +x appimagetool-x86_64.AppImage
          mkdir -p AppDir/usr/bin
          cp dist/fritts AppDir/usr/bin/
          cat > AppDir/fritts.desktop << 'EOF'
          [Desktop Entry]
          Name=Fritts
          Exec=fritts
          Icon=fritts
          Type=Application
          Categories=Science;
          EOF
          cp assets/fritts.png AppDir/fritts.png
          cat > AppDir/AppRun << 'EOF'
          #!/bin/sh
          HERE="$(dirname "$(readlink -f "${0}")")"
          exec "${HERE}/usr/bin/fritts" "$@"
          EOF
          chmod +x AppDir/AppRun
          export APPIMAGE_EXTRACT_AND_RUN=1
          ./appimagetool-x86_64.AppImage AppDir dist/Fritts-x86_64.AppImage

      - name: Upload desktop artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: dist/fritts${{ matrix.ext }}

      - name: Upload AppImage artifact
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: fritts-linux-appimage
          path: dist/*.AppImage

  # ── GitHub Release ─────────────────────────────────────────────────────
  create-release:
    needs: [build-wheel, build-desktop]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          pattern: '*'
          merge-multiple: true
          path: dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Fritts ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            dist/*.whl
            dist/*.tar.gz
            dist/fritts
            dist/fritts.exe
            dist/*.AppImage
          fail_on_unmatched_files: false
